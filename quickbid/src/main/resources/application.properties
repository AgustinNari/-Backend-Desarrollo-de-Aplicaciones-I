spring.application.name=quickbid

# ── Base de datos H2 ──────────────────────────────────────────────────────────
# Guarda los datos en un archivo local (no se pierden al reiniciar)
spring.datasource.url=jdbc:h2:file:./quickbiddb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Consola web para ver las tablas: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=quickbid-secret-key-2026-tpo-dai-uade-grupo8
# Expiración en milisegundos: 86400000 = 24 horas
jwt.expiration=86400000

