spring.application.name=quickbid

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.flyway.enabled=true

spring.servlet.multipart.max-file-size=${APP_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${APP_MAX_REQUEST_SIZE:60MB}

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:15}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:30}
app.files.storage-path=${APP_FILES_STORAGE_PATH:./uploads}
app.files.max-image-size-bytes=${APP_MAX_IMAGE_SIZE_BYTES:10485760}
app.files.max-document-size-bytes=${APP_MAX_DOCUMENT_SIZE_BYTES:10485760}
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:}
app.mail.notifications-enabled=${APP_MAIL_NOTIFICATIONS_ENABLED:true}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:5000}
app.purchase.shipping-flat-cost=${APP_PURCHASE_SHIPPING_FLAT_COST:5000}
app.purchase.completed-points=${APP_PURCHASE_COMPLETED_POINTS:60}
app.purchase.fine-generated-points-penalty=${APP_PURCHASE_FINE_GENERATED_POINTS_PENALTY:90}
app.purchase.fine-expired-points-penalty=${APP_PURCHASE_FINE_EXPIRED_POINTS_PENALTY:250}
app.consignment.return-shipping-flat-cost=${APP_CONSIGNMENT_RETURN_SHIPPING_FLAT_COST:12000}
app.consignment.published-points=${APP_CONSIGNMENT_PUBLISHED_POINTS:70}
app.websocket.presence.ttl-ms=${APP_WEBSOCKET_PRESENCE_TTL_MS:60000}
app.websocket.presence.cleanup-ms=${APP_WEBSOCKET_PRESENCE_CLEANUP_MS:30000}
app.auctions.scheduler-enabled=${APP_AUCTIONS_SCHEDULER_ENABLED:true}
app.auctions.scheduler-delay-ms=${APP_AUCTIONS_SCHEDULER_DELAY_MS:2000}
app.admin.enabled=${APP_ADMIN_ENABLED:false}
app.admin.internal-key=${APP_ADMIN_INTERNAL_KEY:}
app.admin.employee-id=${APP_ADMIN_EMPLOYEE_ID:1002}
